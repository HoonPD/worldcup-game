<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2026 월드컵 예측 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">🏆 2026 월드컵 4강/우승 예측</h1>
        
        <!-- 실시간 경기 결과 반영 업데이트 -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <h2 class="font-bold text-blue-800 mb-2">⚽ 8강 실시간 대진 현황 및 일정</h2>
            <div class="grid grid-cols-2 gap-3 text-sm text-gray-700">
                <div class="font-semibold text-green-600">✅ 매치 1: 프랑스 2 : 0 모로코 (종료)</div>
                <div class="font-semibold text-green-600">✅ 매치 2: 스페인 2 : 1 벨기에 (종료)</div>
                <div class="font-semibold text-green-600">✅ 매치 3: 노르웨이 1 : 2 잉글랜드 (종료)</div>
                <div class="font-semibold text-green-600">✅ 매치 4: 아르헨티나 3 : 1 스위스 (종료)</div>
            </div>
        </div>

        <form id="predictForm" class="space-y-5">
            <div>
                <label class="block font-semibold mb-1">닉네임</label>
                <input type="text" id="nickname" required class="w-full p-2 border rounded" placeholder="이름을 입력하세요">
            </div>

            <!-- 4강 예측 -->
            <div>
                <label class="block font-semibold mb-2">4강 진출 예상 4팀 (매치1,2 종료, 3~4번 선택)</label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <span class="block text-xs text-gray-500 mb-1">매치 1 (확정)</span>
                        <div class="p-2 border rounded w-full bg-gray-100 text-gray-600 font-bold">프랑스 (승리)</div>
                        <input type="hidden" id="match1" value="프랑스">
                    </div>
                    <div>
                        <span class="block text-xs text-gray-500 mb-1">매치 2 (확정)</span>
                        <div class="p-2 border rounded w-full bg-gray-100 text-gray-600 font-bold">스페인 (승리)</div>
                        <input type="hidden" id="match2" value="스페인">
                    </div>
                    <div>
                        <span class="block text-xs text-gray-500 mb-1">매치 3 (확정)</span>
                        <div class="p-2 border rounded w-full bg-gray-100 text-gray-600 font-bold">잉글랜드 (승리)</div>
                        <input type="hidden" id="match3" value="잉글랜드">
                    </div>
                    <div>
                        <span class="block text-xs text-gray-500 mb-1">매치 4 (확정)/span>
                        <div class="p-2 border rounded w-full bg-gray-100 text-gray-600 font-bold">아르헨티나 (승리)</div>
                        <input type="hidden" id="match4" value="아르헨티나">
                    </div>
                </div>
            </div>

            <!-- 우승 / 준우승 예측 -->
            <div class="p-4 bg-yellow-50 border-2 border-yellow-400 rounded-lg shadow-sm">
                <h3 class="font-bold text-lg text-yellow-800 mb-3">🥇 최종 결승 결과 예측</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-medium text-gray-700 mb-1">우승 팀 (40점)</label>
                        <select id="winner" class="w-full p-2 border-2 border-yellow-500 bg-white rounded font-bold text-yellow-900" required>
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-medium text-gray-700 mb-1">준우승 팀 (20점)</label>
                        <select id="runnerUp" class="w-full p-2 border rounded bg-white" required>
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">남은 경기 예측 제출하기</button>
        </form>
        <div class="text-center mt-4"><a href="dashboard.html" class="text-blue-500 hover:underline">👉 전체 결과 대시보드 보기</a></div>
    </div>

    <script>
        const semiSelects = document.querySelectorAll('.semi');
        const match1Value = document.getElementById('match1').value;
        const match2Value = document.getElementById('match2').value; // 스페인 값 연동 완료
        const match2Value = document.getElementById('match3').value; // 잉글랜드 값 연동 완료
        const match2Value = document.getElementById('match4').value; // 아르헨티나 값 연동 완료

        const winnerSelect = document.getElementById('winner');
        const runnerUpSelect = document.getElementById('runnerUp');

        function updateFinalists() {
            // 프랑스, 스페인을 기본 포함하고 선택된 매치 3, 4번 팀을 병합합니다.
            const selectedTeams = [match1Value, match2Value, match3Value, match4Value, ...Array.from(semiSelects).map(s => s.value)].filter(v => v);
            const currentWinner = winnerSelect.value;
            const currentRunner = runnerUpSelect.value;

            winnerSelect.innerHTML = '<option value="">선택하세요</option>';
            runnerUpSelect.innerHTML = '<option value="">선택하세요</option>';

            selectedTeams.forEach(team => {
                winnerSelect.innerHTML += `<option value="${team}">${team}</option>`;
                runnerUpSelect.innerHTML += `<option value="${team}">${team}</option>`;
            });

            winnerSelect.value = selectedTeams.includes(currentWinner) ? currentWinner : "";
            runnerUpSelect.value = selectedTeams.includes(currentRunner) ? currentRunner : "";
        }

        // 초기 실행 (프랑스, 스페인이 목록에 자동 선반영되어 결승 후보가 채워집니다)
        updateFinalists();

        semiSelects.forEach(s => s.addEventListener('change', updateFinalists));

        winnerSelect.addEventListener('change', () => {
            const selectedTeams = [match1Value, match2Value, match3Value, match4Value, ...Array.from(semiSelects).map(s => s.value)].filter(v => v);
            const winner = winnerSelect.value;
            
            runnerUpSelect.innerHTML = '<option value="">선택하세요</option>';
            selectedTeams.forEach(team => {
                if(team !== winner) {
                    runnerUpSelect.innerHTML += `<option value="${team}">${team}</option>`;
                }
            });
        });

        // index.html의 submit 이벤트 리스너 부분을 아래처럼 변경해 주세요.
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const semiFinals = [match1Value, match2Value, match3Value, match4Value, ...Array.from(semiSelects).map(s => s.value)];
            const nickname = document.getElementById('nickname').value;
            const winner = winnerSelect.value;
            const runnerUp = runnerUpSelect.value;
            
            // 💡 현재 시간을 ISO 형식(예: 2026-07-11T07:15:00.000Z)으로 생성합니다.
            const submittedAt = new Date().toISOString(); 
        
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 💡 body에 submittedAt을 추가해서 백엔드로 넘겨줍니다.
                    body: JSON.stringify({ nickname, semiFinals, winner, runnerUp, submittedAt }) 
                });
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('worldcup_nickname', nickname);
                }
                
                alert(data.message);
                if(data.success) location.href = 'dashboard.html';
            } catch (error) {
                alert("서버 통신 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
            }
        });
    </script>
</body>
</html>
