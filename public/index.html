<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 월드컵 예측 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #1a365d; }
        
        /* 🏆 내 결과 하이라이트 박스 스타일 */
        .my-highlight-box {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .my-highlight-box h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
        
        /* 점수 상세 내역 뱃지 */
        .score-breakdown { font-size: 13px; color: #e0f2fe; margin-top: 8px; background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 6px; }
        
        /* 랭킹 테이블 스타일 */
        .ranking-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ranking-table th, .ranking-table td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #edf2f7; }
        .ranking-table th { background-color: #1a365d; color: white; font-weight: bold; }
        .ranking-table tr:hover { background-color: #f8fafc; }
        
        /* 테이블 내 내 열 하이라이트 */
        .row-highlight { background-color: #eff6ff !important; font-weight: bold; border-left: 5px solid #3b82f6; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-winner { background-color: #fef3c7; color: #d97706; }
        .badge-runner { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 실시간 예측 결과 대시보드</h1>
    
    <!-- 1. 최상단 내 결과 하이라이트 구역 -->
    <div id="myPredictionArea"></div>

    <!-- 2. 전체 실시간 순위표 구역 -->
    <h2>📊 실시간 랭킹 순위</h2>
    <table class="ranking-table">
        <thead>
            <tr>
                <th>순위</th>
                <th>닉네임</th>
                <th>4강 예측팀</th>
                <th>우승 / 준우승</th>
                <th>총점</th>
            </tr>
        </thead>
        <tbody id="rankingBody">
            <!-- 데이터가 동적으로 주입됩니다 -->
        </tbody>
    </table>
</div>

<script>
    // 예측 페이지에서 저장한 내 닉네임 가져오기
    const myNickname = localStorage.getItem('worldcup_nickname');

    async function loadDashboard() {
        try {
            const response = await fetch('/api/results');
            const data = await response.json();
            
            const actual = data.actualResult;
            const results = data.results;
            
            const rankingBody = document.getElementById('rankingBody');
            const myPredictionArea = document.getElementById('myPredictionArea');
            
            rankingBody.innerHTML = '';
            myPredictionArea.innerHTML = '';
            
            let myData = null;

            // 1. 전체 순위표 리스트 렌더링
            results.forEach((user, index) => {
                const isMe = user.nickname === myNickname;
                if (isMe) myData = { ...user, rank: index + 1 }; // 내 데이터 따로 저장

                // 점수 상세 계산 과정 텍스트 만들기
                const detailText = getScoreBreakdownText(user, actual);

                const row = document.createElement('tr');
                if (isMe) row.className = 'row-highlight';
                
                row.innerHTML = `
                    <td>${index + 1}위</td>
                    <td>${user.nickname} ${isMe ? '👤 (나)' : ''}</td>
                    <td>${user.semiFinals.join(', ')}</td>
                    <td>
                        <span class="badge badge-winner">🥇 ${user.winner}</span><br>
                        <span class="badge badge-runner">🥈 ${user.runnerUp}</span>
                    </td>
                    <td title="${detailText}"><strong>${user.score}점</strong></td>
                `;
                rankingBody.appendChild(row);
            });

            // 2. 내가 참여한 경우, 최상단에 하이라이트 보드 생성
            if (myData) {
                const myBreakdown = getScoreBreakdownText(myData, actual);
                myPredictionArea.innerHTML = `
                    <div class="my-highlight-box">
                        <h2>👤 나의 예측 요약 및 실시간 등수 (현재 ${myData.rank}위)</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div><strong>내가 픽한 4강:</strong> ${myData.semiFinals.join(', ')}</div>
                            <div><strong>우승 / 준우승:</strong> 🥇 ${myData.winner} / 🥈 ${myData.runnerUp}</div>
                        </div>
                        <div class="score-breakdown">
                            <strong>🎯 점수 획득 상세 내역:</strong> ${myBreakdown} ➡️ <strong>총 ${myData.score}점</strong>
                        </div>
                    </div>
                `;
            } else {
                myPredictionArea.innerHTML = `
                    <div style="background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; color: #4a5568;">
                        아직 예측에 참여하지 않으셨거나, 다른 기기에서 접속하셨습니다.
                    </div>
                `;
            }

        } catch (error) {
            console.error('대시보드 로드 실패:', error);
        }
    }

    // 🎯 백엔드 로직과 정확히 일치하는 점수 쪼개기 도우미 함수
    function getScoreBreakdownText(user, actual) {
        let semiCount = 0;
        user.semiFinals.forEach(team => {
            if (actual.semiFinals.includes(team)) semiCount++;
        });
        const semiScore = semiCount * 10;

        const winnerScore = (actual.winner && user.winner === actual.winner) ? 40 : 0;
        const runnerScore = (actual.runnerUp && user.runnerUp === actual.runnerUp) ? 30 : 0;

        return `4강 적중 ${semiCount}팀 (+${semiScore}점) | 우승 적중 (+${winnerScore}점) | 준우승 적중 (+${runnerScore}점)`;
    }

    // 페이지 열리면 로드
    loadDashboard();
</script>
</body>
</html>
