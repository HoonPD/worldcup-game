<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예측 결과 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">📊 유저별 예측 현황 대시보드</h1>
            <a href="index.html" class="bg-blue-500 text-white px-4 py-2 rounded font-semibold hover:bg-blue-600 transition">↩ 내 예측 수정/참여하기</a>
        </div>

        <!-- 실시간 스코어 보드 및 안내 -->
        <div class="bg-amber-50 border border-amber-200 p-4 rounded-lg mb-6 text-sm text-amber-900">
            💡 <strong>동점자 처리 안내:</strong> 점수가 같을 경우, 하단의 <strong>제출 시간</strong>이 더 빠른 유저가 상위 순위로 인정됩니다.
        </div>

        <!-- 결과 테이블 -->
        <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="w-full text-left border-collapse bg-white text-sm">
                <thead class="bg-gray-50 text-gray-700 font-semibold uppercase border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4">순위</th>
                        <th class="px-6 py-4">닉네임</th>
                        <th class="px-6 py-4">4강 진출 예측 팀</th>
                        <th class="px-6 py-4 text-center">🥇 우승</th>
                        <th class="px-6 py-4 text-center">🥈 준우승</th>
                        <th class="px-6 py-4 text-center">총점</th>
                        <th class="px-6 py-4 text-center">제출 시간</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="7" class="px-6 py-10 text-center text-gray-500">데이터를 불러오는 중입니다...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 날짜 포맷 함수 (ISO 시간을 "MM/DD HH:mm" 형태로 변환)
        function formatDate(isoString) {
            if (!isoString) return "-";
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return "-";
            
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${month}/${day} ${hours}:${minutes}`;
        }

        async function loadDashboard() {
            const myNickname = localStorage.getItem('worldcup_nickname');
            const tbody = document.getElementById('leaderboardBody');

            try {
                // 서버 API 통신 (/api/results 주소 매칭)
                const res = await fetch('/api/results'); 
                const data = await res.json(); 

                // 객체 내부의 결과 배열(results) 추출
                const predictions = data.results || []; 

                tbody.innerHTML = '';

                if (predictions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-gray-500">참여한 유저가 없습니다. 첫 예측을 제출해 보세요!</td></tr>`;
                    return;
                }

                predictions.forEach((user, index) => {
                    const isMe = user.nickname === myNickname;
                    const rowClass = isMe ? 'bg-yellow-50 font-semibold' : 'hover:bg-gray-50';
                    const rankBadge = index === 0 ? '🥇 1등' : index === 1 ? '🥈 2등' : index === 2 ? '🥉 3등' : `${index + 1}등`;
                    const teamsText = user.semiFinals ? user.semiFinals.filter(v => v).join(', ') : '-';

                    tbody.innerHTML += `
                        <tr class="${rowClass} transition-colors">
                            <td class="px-6 py-4 font-bold text-gray-900">${rankBadge}</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <span>${user.nickname}</span>
                                    ${isMe ? '<span class="bg-yellow-200 text-yellow-800 text-xs px-2 py-0.5 rounded-full font-bold">MY</span>' : ''}
                                </div>
                            </td>
                            <td class="px-6 py-4 text-gray-600">${teamsText}</td>
                            <td class="px-6 py-4 text-center font-bold text-amber-600">${user.winner || '-'}</td>
                            <td class="px-6 py-4 text-center font-bold text-gray-500">${user.runnerUp || '-'}</td>
                            <td class="px-6 py-4 text-center font-extrabold text-blue-600 text-base">${user.score || 0}점</td>
                            <td class="px-6 py-4 text-center text-xs text-gray-500">${formatDate(user.timestamp)}</td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("대시보드 렌더링 실패:", error);
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-red-500 font-semibold">데이터를 가져오는 중 오류가 발생했습니다.</td></tr>`;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
